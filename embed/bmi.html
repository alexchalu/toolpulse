<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            padding: 20px;
            line-height: 1.5;
        }
        .calculator {
            max-width: 360px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 20px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #0071e3;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #0077ed;
        }
        button:active {
            background: #006edb;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: #f5f5f7;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .result.show {
            display: block;
        }
        .bmi-value {
            font-size: 36px;
            font-weight: 700;
            color: #0071e3;
            margin-bottom: 8px;
        }
        .bmi-category {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .bmi-range {
            font-size: 14px;
            color: #6e6e73;
        }
        .attribution {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #6e6e73;
        }
        .attribution a {
            color: #0071e3;
            text-decoration: none;
        }
        .attribution a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<a href="#main-content" class="skip-link" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:9999;padding:8px 16px;background:#0071e3;color:#fff;text-decoration:none;font-size:14px;border-radius:0 0 4px 0;" onfocus="this.style.position=\'fixed\';this.style.left=\'0\';this.style.top=\'0\';this.style.width=\'auto\';this.style.height=\'auto\';this.style.overflow=\'visible\'" onblur="this.style.position=\'absolute\';this.style.left=\'-9999px\';this.style.width=\'1px\';this.style.height=\'1px\';this.style.overflow=\'hidden\'">Skip to content</a>
    <div class="calculator">
        <h2>BMI Calculator</h2>
        <div class="input-group">
            <label for="unit">Unit System</label>
            <select id="unit" aria-label="Unit">
                <option value="metric">Metric (kg, cm)</option>
                <option value="imperial">Imperial (lbs, in)</option>
            </select>
        </div>
        <div class="input-group">
            <label for="weight">Weight <span id="weightUnit">(kg)</span></label>
            <input type="number" id="weight" placeholder="70" step="0.1" aria-label="70">
        </div>
        <div class="input-group">
            <label for="height">Height <span id="heightUnit">(cm)</span></label>
            <input type="number" id="height" placeholder="170" step="0.1" aria-label="170">
        </div>
        <button onclick="calculateBMI()">Calculate BMI</button>
        <div class="result" id="result">
            <div class="bmi-value" id="bmiValue">0.0</div>
            <div class="bmi-category" id="bmiCategory"></div>
            <div class="bmi-range" id="bmiRange"></div>
        </div>
        <div class="attribution">
            Powered by <a href="https://calcleap.com" target="_blank">CalcLeap</a>
        </div>
    </div>

    <script>
        const unitSelect = document.getElementById('unit');
        const weightUnit = document.getElementById('weightUnit');
        const heightUnit = document.getElementById('heightUnit');

        unitSelect.addEventListener('change', function() {
            if (this.value === 'metric') {
                weightUnit.textContent = '(kg)';
                heightUnit.textContent = '(cm)';
            } else {
                weightUnit.textContent = '(lbs)';
                heightUnit.textContent = '(in)';
            }
        });

        function calculateBMI() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const unit = document.getElementById('unit').value;

            if (!weight || !height || weight <= 0 || height <= 0) {
                alert('Please enter valid weight and height values');
                return;
            }

            let bmi;
            if (unit === 'metric') {
                // BMI = weight (kg) / (height (m))^2
                const heightInMeters = height / 100;
                bmi = weight / (heightInMeters * heightInMeters);
            } else {
                // BMI = (weight (lbs) / (height (in))^2) * 703
                bmi = (weight / (height * height)) * 703;
            }

            let category, range, color;
            if (bmi < 18.5) {
                category = 'Underweight';
                range = 'BMI < 18.5';
                color = '#5ac8fa';
            } else if (bmi < 25) {
                category = 'Normal Weight';
                range = 'BMI 18.5 - 24.9';
                color = '#34c759';
            } else if (bmi < 30) {
                category = 'Overweight';
                range = 'BMI 25 - 29.9';
                color = '#ff9500';
            } else {
                category = 'Obese';
                range = 'BMI ≥ 30';
                color = '#ff3b30';
            }

            document.getElementById('bmiValue').textContent = bmi.toFixed(1);
            document.getElementById('bmiCategory').textContent = category;
            document.getElementById('bmiCategory').style.color = color;
            document.getElementById('bmiRange').textContent = range;
            document.getElementById('result').classList.add('show');
        }
    </script>

<p style="margin:0;flex:1;min-width:250px">We use cookies for analytics and advertising (Google AdSense). By continuing to use this site, you consent to our use of cookies. <a href="/privacy.html" style="color:#6366f1;text-decoration:underline">Privacy Policy</a></p>

<button onclick="document.getElementById('clCookieConsent').style.display='none';localStorage.setItem('clCookieOk','0')" style="background:transparent;color:#9ca3af;border:1px solid #4b5563;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-size:.875rem">Decline</button>
</div>
</div>
<script>if(!localStorage.getItem('clCookieOk')){document.getElementById('clCookieConsent').style.display='flex'}</script>
</body>
</html>
