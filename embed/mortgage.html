<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            padding: 20px;
            line-height: 1.5;
        }
        .calculator {
            max-width: 360px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 20px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #0071e3;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #0077ed;
        }
        button:active {
            background: #006edb;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: #f5f5f7;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .result-label {
            font-size: 14px;
            color: #6e6e73;
        }
        .result-value {
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
        }
        .result-value.primary {
            font-size: 28px;
            color: #0071e3;
        }
        .attribution {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #6e6e73;
        }
        .attribution a {
            color: #0071e3;
            text-decoration: none;
        }
        .attribution a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<a href="#main-content" class="skip-link" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:9999;padding:8px 16px;background:#0071e3;color:#fff;text-decoration:none;font-size:14px;border-radius:0 0 4px 0;" onfocus="this.style.position=\'fixed\';this.style.left=\'0\';this.style.top=\'0\';this.style.width=\'auto\';this.style.height=\'auto\';this.style.overflow=\'visible\'" onblur="this.style.position=\'absolute\';this.style.left=\'-9999px\';this.style.width=\'1px\';this.style.height=\'1px\';this.style.overflow=\'hidden\'">Skip to content</a>
    <div class="calculator">
        <h2>Mortgage Calculator</h2>
        <div class="input-group">
            <label for="loanAmount">Loan Amount ($)</label>
            <input type="number" id="loanAmount" placeholder="300000" step="1000" aria-label="300000">
        </div>
        <div class="input-group">
            <label for="interestRate">Interest Rate (%)</label>
            <input type="number" id="interestRate" placeholder="6.5" step="0.01" aria-label="6.5">
        </div>
        <div class="input-group">
            <label for="loanTerm">Loan Term (years)</label>
            <input type="number" id="loanTerm" placeholder="30" step="1" aria-label="30">
        </div>
        <button onclick="calculateMortgage()">Calculate Payment</button>
        <div class="result" id="result">
            <div class="result-row">
                <span class="result-label">Monthly Payment</span>
                <span class="result-value primary" id="monthlyPayment">$0</span>
            </div>
            <hr style="border: none; border-top: 1px solid #d2d2d7; margin: 16px 0;">
            <div class="result-row">
                <span class="result-label">Total Payment</span>
                <span class="result-value" id="totalPayment">$0</span>
            </div>
            <div class="result-row">
                <span class="result-label">Total Interest</span>
                <span class="result-value" id="totalInterest">$0</span>
            </div>
        </div>
        <div class="attribution">
            Powered by <a href="https://calcleap.com" target="_blank">CalcLeap</a>
        </div>
    </div>

    <script>
        function calculateMortgage() {
            const loanAmount = parseFloat(document.getElementById('loanAmount').value);
            const annualRate = parseFloat(document.getElementById('interestRate').value);
            const years = parseInt(document.getElementById('loanTerm').value);

            if (!loanAmount || !annualRate || !years || loanAmount <= 0 || annualRate <= 0 || years <= 0) {
                alert('Please enter valid loan amount, interest rate, and term');
                return;
            }

            // Convert to monthly rate and number of payments
            const monthlyRate = (annualRate / 100) / 12;
            const numPayments = years * 12;

            // Calculate monthly payment using mortgage formula
            // M = P * [r(1+r)^n] / [(1+r)^n - 1]
            const monthlyPayment = loanAmount * 
                (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / 
                (Math.pow(1 + monthlyRate, numPayments) - 1);

            const totalPayment = monthlyPayment * numPayments;
            const totalInterest = totalPayment - loanAmount;

            document.getElementById('monthlyPayment').textContent = 
                '$' + monthlyPayment.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('totalPayment').textContent = 
                '$' + totalPayment.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('totalInterest').textContent = 
                '$' + totalInterest.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            
            document.getElementById('result').classList.add('show');
        }
    </script>

</div>
</div>
<script>if(!localStorage.getItem('clCookieOk')){document.getElementById('clCookieConsent').style.display='flex'}</script>
</body>
</html>
