<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            padding: 20px;
            line-height: 1.5;
        }
        .calculator {
            max-width: 360px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 20px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #0071e3;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #0077ed;
        }
        button:active {
            background: #006edb;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: #f5f5f7;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .result.show {
            display: block;
        }
        .age-value {
            font-size: 36px;
            font-weight: 700;
            color: #0071e3;
            margin-bottom: 8px;
        }
        .age-details {
            font-size: 14px;
            color: #6e6e73;
            margin: 4px 0;
        }
        .age-breakdown {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #d2d2d7;
        }
        .breakdown-item {
            text-align: center;
        }
        .breakdown-value {
            font-size: 20px;
            font-weight: 700;
            color: #1d1d1f;
        }
        .breakdown-label {
            font-size: 12px;
            color: #6e6e73;
            margin-top: 4px;
        }
        .attribution {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #6e6e73;
        }
        .attribution a {
            color: #0071e3;
            text-decoration: none;
        }
        .attribution a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<a href="#main-content" class="skip-link" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:9999;padding:8px 16px;background:#0071e3;color:#fff;text-decoration:none;font-size:14px;border-radius:0 0 4px 0;" onfocus="this.style.position=\'fixed\';this.style.left=\'0\';this.style.top=\'0\';this.style.width=\'auto\';this.style.height=\'auto\';this.style.overflow=\'visible\'" onblur="this.style.position=\'absolute\';this.style.left=\'-9999px\';this.style.width=\'1px\';this.style.height=\'1px\';this.style.overflow=\'hidden\'">Skip to content</a>
    <div class="calculator">
        <h2>Age Calculator</h2>
        <div class="input-group">
            <label for="birthdate">Date of Birth</label>
            <input type="date" id="birthdate" aria-label="Birthdate">
        </div>
        <div class="input-group">
            <label for="calcDate">Calculate Age On</label>
            <input type="date" id="calcDate" aria-label="Calc Date">
        </div>
        <button onclick="calculateAge()">Calculate Age</button>
        <div class="result" id="result">
            <div class="age-value" id="ageValue">0 years</div>
            <div class="age-details" id="ageDetails"></div>
            <div class="age-details" id="nextBirthday"></div>
            <div class="age-breakdown">
                <div class="breakdown-item">
                    <div class="breakdown-value" id="totalMonths">0</div>
                    <div class="breakdown-label">Months</div>
                </div>
                <div class="breakdown-item">
                    <div class="breakdown-value" id="totalWeeks">0</div>
                    <div class="breakdown-label">Weeks</div>
                </div>
                <div class="breakdown-item">
                    <div class="breakdown-value" id="totalDays">0</div>
                    <div class="breakdown-label">Days</div>
                </div>
            </div>
        </div>
        <div class="attribution">
            Powered by <a href="https://calcleap.com" target="_blank">CalcLeap</a>
        </div>
    </div>

    <script>
        // Set today's date as default
        const today = new Date();
        document.getElementById('calcDate').valueAsDate = today;

        function calculateAge() {
            const birthdate = document.getElementById('birthdate').value;
            const calcDateValue = document.getElementById('calcDate').value;

            if (!birthdate) {
                alert('Please enter your date of birth');
                return;
            }

            const birthDate = new Date(birthdate);
            const calcDate = calcDateValue ? new Date(calcDateValue) : new Date();

            if (birthDate > calcDate) {
                alert('Birth date cannot be in the future');
                return;
            }

            // Calculate age in years, months, days
            let years = calcDate.getFullYear() - birthDate.getFullYear();
            let months = calcDate.getMonth() - birthDate.getMonth();
            let days = calcDate.getDate() - birthDate.getDate();

            // Adjust for negative days
            if (days < 0) {
                months--;
                const prevMonth = new Date(calcDate.getFullYear(), calcDate.getMonth(), 0);
                days += prevMonth.getDate();
            }

            // Adjust for negative months
            if (months < 0) {
                years--;
                months += 12;
            }

            // Calculate total months, weeks, days
            const totalMonths = years * 12 + months;
            const totalDays = Math.floor((calcDate - birthDate) / (1000 * 60 * 60 * 24));
            const totalWeeks = Math.floor(totalDays / 7);

            // Calculate next birthday
            let nextBirthday = new Date(calcDate.getFullYear(), birthDate.getMonth(), birthDate.getDate());
            if (nextBirthday < calcDate) {
                nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
            }
            const daysUntilBirthday = Math.ceil((nextBirthday - calcDate) / (1000 * 60 * 60 * 24));

            // Display results
            document.getElementById('ageValue').textContent = 
                years + (years === 1 ? ' year' : ' years');
            document.getElementById('ageDetails').textContent = 
                `${years} years, ${months} months, ${days} days`;
            document.getElementById('nextBirthday').textContent = 
                `Next birthday in ${daysUntilBirthday} days`;
            
            document.getElementById('totalMonths').textContent = totalMonths.toLocaleString();
            document.getElementById('totalWeeks').textContent = totalWeeks.toLocaleString();
            document.getElementById('totalDays').textContent = totalDays.toLocaleString();
            
            document.getElementById('result').classList.add('show');
        }
    </script>

<button onclick="document.getElementById('clCookieConsent').style.display='none';localStorage.setItem('clCookieOk','0')" style="background:transparent;color:#9ca3af;border:1px solid #4b5563;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-size:.875rem">Decline</button>
</div>
</div>
<script>if(!localStorage.getItem('clCookieOk')){document.getElementById('clCookieConsent').style.display='flex'}</script>
</body>
</html>
