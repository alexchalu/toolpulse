<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            padding: 20px;
            line-height: 1.5;
        }
        .calculator {
            max-width: 360px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 20px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #0071e3;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #0077ed;
        }
        button:active {
            background: #006edb;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: #f5f5f7;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .result-label {
            font-size: 14px;
            color: #6e6e73;
        }
        .result-value {
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
        }
        .result-value.primary {
            font-size: 28px;
            color: #0071e3;
        }
        .attribution {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #6e6e73;
        }
        .attribution a {
            color: #0071e3;
            text-decoration: none;
        }
        .attribution a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<a href="#main-content" class="skip-link" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;z-index:9999;padding:8px 16px;background:#0071e3;color:#fff;text-decoration:none;font-size:14px;border-radius:0 0 4px 0;" onfocus="this.style.position=\'fixed\';this.style.left=\'0\';this.style.top=\'0\';this.style.width=\'auto\';this.style.height=\'auto\';this.style.overflow=\'visible\'" onblur="this.style.position=\'absolute\';this.style.left=\'-9999px\';this.style.width=\'1px\';this.style.height=\'1px\';this.style.overflow=\'hidden\'">Skip to content</a>
    <div class="calculator">
        <h2>Compound Interest</h2>
        <div class="input-group">
            <label for="principal">Initial Amount ($)</label>
            <input type="number" id="principal" placeholder="10000" step="100" aria-label="10000">
        </div>
        <div class="input-group">
            <label for="rate">Annual Interest Rate (%)</label>
            <input type="number" id="rate" placeholder="7" step="0.1" aria-label="7">
        </div>
        <div class="input-group">
            <label for="years">Time Period (years)</label>
            <input type="number" id="years" placeholder="10" step="1" aria-label="10">
        </div>
        <div class="input-group">
            <label for="frequency">Compounding Frequency</label>
            <select id="frequency" aria-label="Frequency">
                <option value="1">Annually</option>
                <option value="2">Semi-annually</option>
                <option value="4">Quarterly</option>
                <option value="12" selected>Monthly</option>
                <option value="365">Daily</option>
            </select>
        </div>
        <div class="input-group">
            <label for="contribution">Monthly Contribution ($)</label>
            <input type="number" id="contribution" placeholder="0" step="10" aria-label="0">
        </div>
        <button onclick="calculateCompound()">Calculate Growth</button>
        <div class="result" id="result">
            <div class="result-row">
                <span class="result-label">Future Value</span>
                <span class="result-value primary" id="futureValue">$0</span>
            </div>
            <hr style="border: none; border-top: 1px solid #d2d2d7; margin: 16px 0;">
            <div class="result-row">
                <span class="result-label">Total Principal</span>
                <span class="result-value" id="totalPrincipal">$0</span>
            </div>
            <div class="result-row">
                <span class="result-label">Total Interest</span>
                <span class="result-value" id="totalInterest">$0</span>
            </div>
        </div>
        <div class="attribution">
            Powered by <a href="https://calcleap.com" target="_blank">CalcLeap</a>
        </div>
    </div>

    <script>
        function calculateCompound() {
            const principal = parseFloat(document.getElementById('principal').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            const years = parseFloat(document.getElementById('years').value) || 0;
            const frequency = parseInt(document.getElementById('frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('contribution').value) || 0;

            if (principal <= 0 || rate <= 0 || years <= 0) {
                alert('Please enter valid initial amount, interest rate, and time period');
                return;
            }

            const r = rate / 100;
            const n = frequency;
            const t = years;

            // Compound interest formula: A = P(1 + r/n)^(nt)
            let futureValue = principal * Math.pow(1 + r/n, n*t);

            // Add regular contributions (future value of annuity)
            if (monthlyContribution > 0) {
                const monthlyRate = r / 12;
                const totalMonths = years * 12;
                // FV of annuity = PMT * [(1 + r)^n - 1] / r
                const contributionFV = monthlyContribution * 
                    (Math.pow(1 + monthlyRate, totalMonths) - 1) / monthlyRate;
                futureValue += contributionFV;
            }

            const totalContributions = monthlyContribution * years * 12;
            const totalPrincipal = principal + totalContributions;
            const totalInterest = futureValue - totalPrincipal;

            document.getElementById('futureValue').textContent = 
                '$' + futureValue.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('totalPrincipal').textContent = 
                '$' + totalPrincipal.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('totalInterest').textContent = 
                '$' + totalInterest.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            
            document.getElementById('result').classList.add('show');
        }
    </script>

</body>
</html>
