<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Loan Comparison Calculator – Compare Student Loans</title>
<meta name="description" content="Compare two student loan offers side‑by‑side. Calculate monthly payment, total interest and total cost to pick the best student loan.">
<link rel="stylesheet" href="gold.css">
<link rel="canonical" href="https://calcleap.com/student-loan-comparison-calculator.html">
<meta property="og:title" content="Student Loan Comparison Calculator – Compare Student Loans">
<meta property="og:description" content="Compare two student loan offers side‑by‑side. Calculate monthly payment, total interest and total cost.">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3112605892426625" crossorigin="anonymous"></script>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Student Loan Comparison Calculator","description":"Side‑by‑side comparison of two student loans","url":"https://calcleap.com/student-loan-comparison-calculator.html","applicationCategory":"FinanceApplication","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}
</script>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;color:#333;margin:0;padding:0}
.container{max-width:900px;margin:auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
h1{color:#0056b3}
.field{margin-bottom:1rem}
label{display:block;font-weight:bold;margin-bottom:0.3rem}
input{width:100%;padding:0.6rem;border:1px solid #ccc;border-radius:4px}
button{background:#007bff;color:#fff;padding:0.7rem 1.2rem;border:none;border-radius:4px;cursor:pointer;width:100%}
button:hover{background:#0056b3}
.results{margin-top:1.5rem;background:#f9f9f9;padding:1rem;border-radius:4px}
.results p{margin:0.4rem 0}
</style>
</head>
<body>
<div class="container">
<h1>Student Loan Comparison Calculator</h1>
<p>Enter details of two student loan offers to see which one costs less over time.</p>
<div class="field"><label for="amount1">Loan Amount ($)</label><input type="number" id="amount1" value="20000" min="0"></div>
<div class="field"><label for="interest1">Annual Interest Rate (%)</label><input type="number" id="interest1" value="4.5" step="0.01" min="0"></div>
<div class="field"><label for="term1">Loan Term (years)</label><input type="number" id="term1" value="10" min="1"></div>
<hr>
<div class="field"><label for="amount2">Loan Amount ($)</label><input type="number" id="amount2" value="20000" min="0"></div>
<div class="field"><label for="interest2">Annual Interest Rate (%)</label><input type="number" id="interest2" value="5.0" step="0.01" min="0"></div>
<div class="field"><label for="term2">Loan Term (years)</label><input type="number" id="term2" value="10" min="1"></div>
<button onclick="calc()">Compare</button>
<div class="results" id="out"></div>
</div>
<script>
function monthly(principal, rate, years){
  const r = (rate/100)/12;
  const n = years*12;
  if(r===0) return principal/n;
  return principal * (r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
}
function calc(){
 const a1=parseFloat(document.getElementById('amount1').value)||0;
 const i1=parseFloat(document.getElementById('interest1').value)||0;
 const t1=parseInt(document.getElementById('term1').value)||0;
 const a2=parseFloat(document.getElementById('amount2').value)||0;
 const i2=parseFloat(document.getElementById('interest2').value)||0;
 const t2=parseInt(document.getElementById('term2').value)||0;
 const m1=monthly(a1,i1,t1);
 const m2=monthly(a2,i2,t2);
 const total1=m1*t1*12;
 const total2=m2*t2*12;
 const out=document.getElementById('out');
 out.innerHTML=`<h2>Results</h2><p><strong>Loan 1:</strong> $${m1.toFixed(2)}/mo, total $${total1.toFixed(2)}</p><p><strong>Loan 2:</strong> $${m2.toFixed(2)}/mo, total $${total2.toFixed(2)}</p>`;
}
</script>
</body>
</html>
