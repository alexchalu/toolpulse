<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>California Income Tax Calculator - CalcLeap</title>
    <meta name="description" content="Calculate your estimated California state income tax for various income levels.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.4.1/milligram.min.css">
    <style>
        body { font-family: sans-serif; margin: 2em; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        label { display: block; margin-bottom: 0.5em; }
        input[type="number"] { width: calc(100% - 10px); padding: 8px; margin-bottom: 1em; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #9b4dca; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #8c42b3; }
        #result { margin-top: 1.5em; font-size: 1.1em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>California Income Tax Calculator</h1>
        <p>Estimate your California state income tax based on your annual income and filing status for the most recent tax year (approximate). This calculator provides a simplified estimate and should not be considered tax advice.</p>

        <div>
            <label for="income">Annual Income ($):</label>
            <input type="number" id="income" value="60000">
        </div>

        <div>
            <label for="filingStatus">Filing Status:</label>
            <select id="filingStatus">
                <option value="single">Single</option>
                <option value="married_jointly">Married Filing Jointly</option>
                <option value="married_separately">Married Filing Separately</option>
                <option value="head_household">Head of Household</option>
            </select>
        </div>

        <button onclick="calculateTax()">Calculate Tax</button>

        <div id="result">
            Estimated California State Tax: $0.00
        </div>
    </div>

    <script>
        function calculateTax() {
            const income = parseFloat(document.getElementById('income').value);
            const filingStatus = document.getElementById('filingStatus').value;
            let tax = 0;
            let taxableIncome = income; // Simplification: no deductions/exemptions for this basic version

            // California 2023 Tax Brackets (simplified for demonstration)
            // This is a placeholder and should be updated with actual current year brackets for accuracy.
            const brackets = {
                single: [
                    { limit: 10000, rate: 0.01 }, // 1%
                    { limit: 20000, rate: 0.02 }, // 2%
                    { limit: 30000, rate: 0.04 }, // 4%
                    { limit: 40000, rate: 0.06 }, // 6%
                    { limit: 50000, rate: 0.08 }, // 8%
                    { limit: Infinity, rate: 0.093 } // 9.3% and higher
                ],
                married_jointly: [
                    { limit: 20000, rate: 0.01 },
                    { limit: 40000, rate: 0.02 },
                    { limit: 60000, rate: 0.04 },
                    { limit: 80000, rate: 0.06 },
                    { limit: 100000, rate: 0.08 },
                    { limit: Infinity, rate: 0.093 }
                ],
                married_separately: [ // Same as single for simplicity, often different
                    { limit: 10000, rate: 0.01 },
                    { limit: 20000, rate: 0.02 },
                    { limit: 30000, rate: 0.04 },
                    { limit: 40000, rate: 0.06 },
                    { limit: 50000, rate: 0.08 },
                    { limit: Infinity, rate: 0.093 }
                ],
                head_household: [ // Often slightly different, using single for simplicity here
                    { limit: 15000, rate: 0.01 },
                    { limit: 30000, rate: 0.02 },
                    { limit: 45000, rate: 0.04 },
                    { limit: 60000, rate: 0.06 },
                    { limit: 75000, rate: 0.08 },
                    { limit: Infinity, rate: 0.093 }
                ]
            };

            const selectedBrackets = brackets[filingStatus];
            let remainingIncome = taxableIncome;
            let cumulativeTax = 0;
            let previousLimit = 0;

            for (let i = 0; i < selectedBrackets.length; i++) {
                const bracket = selectedBrackets[i];
                const bracketTaxableAmount = Math.min(remainingIncome, bracket.limit - previousLimit);

                if (bracketTaxableAmount > 0) {
                    cumulativeTax += bracketTaxableAmount * bracket.rate;
                    remainingIncome -= bracketTaxableAmount;
                }
                
                previousLimit = bracket.limit;
                if (remainingIncome <= 0) break;
            }

            document.getElementById('result').innerText = `Estimated California State Tax: $${cumulativeTax.toFixed(2)}`;
        }

        // Calculate on page load
        document.addEventListener('DOMContentLoaded', calculateTax);
    </script>
</body>
</html>
