<main><h1>Sleep Calculator</h1><p class="sub">Find the best time to wake up or go to sleep based on sleep cycles. Wake up feeling refreshed, not groggy.</p><div class="calc"><div class="field"><label class="label">I want to...</label><select id="mode" onchange="toggleMode()"><option value="wake">Calculate when to WAKE UP (I know my bedtime)</option><option value="sleep">Calculate when to SLEEP (I know my wake time)</option></select></div>
<div id="wakeMode"><div class="field"><label class="label">I plan to fall asleep at:</label><div class="row"><select id="bedH" style="width:auto"><option value="20">8 PM</option><option value="21">9 PM</option><option value="22" selected>10 PM</option><option value="23">11 PM</option><option value="0">12 AM</option><option value="1">1 AM</option></select><select id="bedM" style="width:auto"><option value="0" selected>:00</option><option value="15">:15</option><option value="30">:30</option><option value="45">:45</option></select></div></div></div>
<div id="sleepMode" style="display:none"><div class="field"><label class="label">I need to wake up at:</label><div class="row"><select id="wakeH" style="width:auto"><option value="5">5 AM</option><option value="6" selected>6 AM</option><option value="7">7 AM</option><option value="8">8 AM</option><option value="9">9 AM</option></select><select id="wakeM" style="width:auto"><option value="0" selected>:00</option><option value="15">:15</option><option value="30">:30</option><option value="45">:45</option></select></div></div></div>
<button class="btn" onclick="calc()">Calculate Sleep Times</button><div id="out" style="margin-top:1.5rem"></div></div></main>

<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function toggleMode(){$('wakeMode').style.display=$('mode').value==='wake'?'':'none';$('sleepMode').style.display=$('mode').value==='sleep'?'':'none'}function calc(){const cycle=90;const fallAsleep=15;if($('mode').value==='wake'){const h=+$('bedH').value,m=+$('bedM').value;const bed=h*60+m+fallAsleep;let html='<div style="text-align:center;margin-bottom:1rem"><div style="font-size:.85rem;color:var(--m)">If you fall asleep at '+(h>12?h-12:h||12)+':'+(m<10?'0':'')+m+(h>=12?' PM':' AM')+', wake up at:</div></div><div class="results-grid">';for(let c=6;c>=3;c--){const wake=(bed+c*cycle)%1440;const wh=Math.floor(wake/60);const wm=wake%60;const quality=c>=5?'🟢 Ideal':c===4?'🟡 OK':'🟠 Short';html+='<div class="stat"><div class="val" style="color:'+(c>=5?'#22c55e':c===4?'#eab308':'#ef4444')+'">'+(wh>12?wh-12:wh||12)+':'+(wm<10?'0':'')+wm+(wh>=12?' PM':' AM')+'</div><div class="lbl">'+c+' cycles ('+c*1.5+'h) '+quality+'</div></div>'}html+='</div>';$('out').innerHTML=html}else{const h=+$('wakeH').value,m=+$('wakeM').value;const wake=h*60+m;let html='<div style="text-align:center;margin-bottom:1rem"><div style="font-size:.85rem;color:var(--m)">To wake at '+h+':'+(m<10?'0':'')+m+' AM, go to bed at:</div></div><div class="results-grid">';for(let c=6;c>=3;c--){let sleep=(wake-c*cycle-fallAsleep+1440)%1440;const sh=Math.floor(sleep/60);const sm=sleep%60;const quality=c>=5?'🟢 Ideal':c===4?'🟡 OK':'🟠 Short';html+='<div class="stat"><div class="val" style="color:'+(c>=5?'#22c55e':c===4?'#eab308':'#ef4444')+'">'+(sh>12?sh-12:sh||12)+':'+(sm<10?'0':'')+sm+(sh>=12?' PM':' AM')+'</div><div class="lbl">'+c+' cycles ('+c*1.5+'h) '+quality+'</div></div>'}html+='</div>';$('out').innerHTML=html}}
if(typeof calc==='function')calc();</script></body></html>
