<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const price=+$('price').value,dp=+$('down').value/100,r=+$('rate').value/100/12,n=+$('term').value;const loan=price*(1-dp);const mp=loan*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);const tax=+$('tax').value/12;const ins=+$('ins').value/12;const pmi=dp<0.2?loan*0.005/12:0;const total=mp+tax+ins+pmi;const totalPaid=total*n;const totalInt=mp*n-loan;$('out').innerHTML='<div class="stat"><div class="val" style="color:var(--a);font-size:1.5rem">$'+fmt(total)+'</div><div class="lbl">Total Monthly</div></div><div class="stat"><div class="val">$'+fmt(mp)+'</div><div class="lbl">Principal & Interest</div></div><div class="stat"><div class="val">$'+fmt(tax)+'</div><div class="lbl">Property Tax</div></div><div class="stat"><div class="val">$'+fmt(ins)+'</div><div class="lbl">Insurance</div></div>'+(pmi>0?'<div class="stat"><div class="val">$'+fmt(pmi)+'</div><div class="lbl">PMI</div></div>':'')+'<div class="stat"><div class="val">$'+fmt(loan,0)+'</div><div class="lbl">Loan Amount</div></div><div class="stat"><div class="val">$'+fmt(totalInt,0)+'</div><div class="lbl">Total Interest</div></div>'}
