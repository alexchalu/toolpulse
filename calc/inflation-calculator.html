<style>:root{--bg:#0a0e1a;--s:#111827;--s2:#1f2937;--b:#374151;--t:#f3f4f6;--m:#9ca3af;--a:#6366f1;--a2:#4f46e5;--g:rgba(99,102,241,.12)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);line-height:1.6}header{background:var(--s);border-bottom:1px solid var(--b);padding:.75rem 1.5rem;position:sticky;top:0;z-index:100}.hi{max-width:800px;margin:0 auto;display:flex;align-items:center;gap:1rem}.logo{font-size:1.2rem;font-weight:800;color:var(--a);text-decoration:none}.tag{color:var(--m);font-size:.8rem;flex:1}main{max-width:800px;margin:0 auto;padding:2rem 1.5rem}h1{font-size:1.6rem;margin-bottom:.5rem}.sub{color:var(--m);margin-bottom:1.5rem;font-size:.9rem}.calc{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:1.5rem}.field{margin-bottom:1rem}.label{display:block;font-weight:600;margin-bottom:.4rem;font-size:.85rem}input[type="number"],input[type="text"],input[type="date"],select,textarea{width:100%;padding:.7rem .9rem;background:var(--s2);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:.9rem;outline:none;font-family:inherit}input:focus,select:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--g)}.row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}.btn{padding:.65rem 1.2rem;background:var(--a);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer}.btn:hover{background:var(--a2)}.result{margin-top:1.5rem;padding:1.5rem;background:var(--s2);border-radius:10px;text-align:center}.result .val{font-size:2rem;font-weight:800;color:var(--a)}.result .lbl{font-size:.8rem;color:var(--m);margin-top:.25rem}.results-grid{margin-top:1.5rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.75rem}.stat{background:var(--s2);border-radius:8px;padding:.75rem;text-align:center}.stat .val{font-size:1.2rem;font-weight:800;color:var(--a)}.stat .lbl{font-size:.7rem;color:var(--m)}.ad{max-width:800px;margin:1rem auto;padding:0 1.5rem}footer{text-align:center;padding:1.5rem;color:var(--m);font-size:.8rem;border-top:1px solid var(--b);margin-top:2rem}footer a{color:var(--a);text-decoration:none}table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:1rem}th,td{padding:.5rem .6rem;text-align:right;border-bottom:1px solid var(--b)}th{color:var(--m);font-weight:600;font-size:.7rem;text-transform:uppercase}td:first-child,th:first-child{text-align:left}@media(max-width:600px){.row,.row3{grid-template-columns:1fr}.results-grid{grid-template-columns:1fr 1fr}}</style>

<main><h1>Inflation Calculator</h1><p class="sub">Calculate the impact of inflation on purchasing power. See what your money will be worth in the future.</p><div class="calc"><div class="row"><div class="field"><label class="label">Amount ($)</label><input type="number" id="amount" value="100000"></div><div class="field"><label class="label">Inflation Rate (%)</label><input type="number" id="rate" value="3" step="0.1"></div></div>
<div class="field"><label class="label">Number of Years</label><input type="number" id="years" value="10"></div>
<button class="btn" onclick="calc()">Calculate</button><div class="results-grid" id="out"></div><div id="table"></div></div></main>

<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const a=+$('amount').value,r=+$('rate').value/100,y=+$('years').value;const future=a*Math.pow(1+r,y);const purchasing=a/Math.pow(1+r,y);const lost=a-purchasing;$('out').innerHTML='<div class="stat"><div class="val" style="color:#ef4444">$'+fmt(purchasing,0)+'</div><div class="lbl">Purchasing Power in '+y+' Years</div></div><div class="stat"><div class="val">$'+fmt(lost,0)+'</div><div class="lbl">Value Lost to Inflation</div></div><div class="stat"><div class="val">$'+fmt(future,0)+'</div><div class="lbl">Cost of $'+fmt(a,0)+' Item in '+y+' Years</div></div><div class="stat"><div class="val">'+fmt(lost/a*100,1)+'%</div><div class="lbl">Purchasing Power Lost</div></div>';let t='<table><tr><th>Year</th><th>Purchasing Power</th><th>Equivalent Cost</th><th>Lost Value</th></tr>';for(let i=1;i<=y;i++){const pp=a/Math.pow(1+r,i);t+='<tr><td>'+i+'</td><td>$'+fmt(pp,0)+'</td><td>$'+fmt(a*Math.pow(1+r,i),0)+'</td><td>$'+fmt(a-pp,0)+'</td></tr>'}t+='</table>';$('table').innerHTML=t}
if(typeof calc==='function')calc();</script></body></html>
