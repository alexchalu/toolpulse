<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){let b=+$('bal').value;const r=+$('rate').value/100/12,mp=+$('pay').value,inc=+$('income').value;let months=0,totalInt=0;let tb=b;while(b>0&&months<600){months++;const int=b*r;totalInt+=int;b=Math.max(0,b-(mp-int))}const dti=(mp*12/inc*100);$('out').innerHTML='<div class="stat"><div class="val">'+Math.floor(months/12)+'y '+months%12+'m</div><div class="lbl">Time to Pay Off</div></div><div class="stat"><div class="val">$'+fmt(totalInt,0)+'</div><div class="lbl">Total Interest</div></div><div class="stat"><div class="val">$'+fmt(tb+totalInt,0)+'</div><div class="lbl">Total Cost</div></div><div class="stat"><div class="val">'+fmt(dti,1)+'%</div><div class="lbl">Debt-to-Income</div></div><div class="stat"><div class="val">$'+fmt(mp*12,0)+'</div><div class="lbl">Annual Payments</div></div><div class="stat"><div class="val">'+(months<=120?"✅ Good":"⚠️ Long")+'</div><div class="lbl">Timeline Check</div></div>'}
