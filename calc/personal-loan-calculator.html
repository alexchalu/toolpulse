<main><h1>Personal Loan Calculator</h1><p class="sub">Calculate monthly payments and total interest for personal loans. Compare loan terms and rates.</p><div class="calc"><div class="row"><div class="field"><label class="label">Loan Amount ($)</label><input type="number" id="amt" value="15000"></div><div class="field"><label class="label">Interest Rate (%)</label><input type="number" id="rate" value="9.5" step="0.1"></div></div>

<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const a=+$('amt').value,r=+$('rate').value/100/12,n=+$('term').value;const mp=a*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);const total=mp*n;const interest=total-a;$('out').innerHTML='<div class="stat"><div class="val">$'+fmt(mp)+'</div><div class="lbl">Monthly Payment</div></div><div class="stat"><div class="val">$'+fmt(total)+'</div><div class="lbl">Total Paid</div></div><div class="stat"><div class="val">$'+fmt(interest)+'</div><div class="lbl">Total Interest</div></div><div class="stat"><div class="val">'+fmt(interest/a*100,1)+'%</div><div class="lbl">Interest/Principal</div></div>';let b=a,h='<table><tr><th>Month</th><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th></tr>';for(let i=1;i<=Math.min(n,12);i++){const int=b*r;const pr=mp-int;b-=pr;h+='<tr><td>'+i+'</td><td>$'+fmt(mp)+'</td><td>$'+fmt(pr)+'</td><td>$'+fmt(int)+'</td><td>$'+fmt(Math.max(0,b))+'</td></tr>'}if(n>12)h+='<tr><td colspan="5" style="text-align:center;color:var(--m)">... '+(n-12)+' more months ...</td></tr>';h+='</table>';$('sched').innerHTML=h}
if(typeof calc==='function')calc();</script></body></html>
