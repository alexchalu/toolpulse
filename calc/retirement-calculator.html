ght:800;color:var(--a)}.stat .lbl{font-size:.7rem;color:var(--m)}.ad{max-width:800px;margin:1rem auto;padding:0 1.5rem}footer{text-align:center;padding:1.5rem;color:var(--m);font-size:.8rem;border-top:1px solid var(--b);margin-top:2rem}footer a{color:var(--a);text-decoration:none}table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:1rem}th,td{padding:.5rem .6rem;text-align:right;border-bottom:1px solid var(--b)}th{color:var(--m);font-weight:600;font-size:.7rem;text-transform:uppercase}td:first-child,th:first-child{text-align:left}@media(max-width:600px){.row,.row3{grid-template-columns:1fr}.results-grid{grid-template-columns:1fr 1fr}}</style>

<main><h1>Retirement Calculator</h1><p class="sub">Calculate how much you need to save for retirement. See if you are on track to retire comfortably.</p><div class="calc"><div class="row"><div class="field"><label class="label">Current Age</label><input type="number" id="age" value="30"></div><div class="field"><label class="label">Retirement Age</label><input type="number" id="retAge" value="65"></div></div>
<div class="row"><div class="field"><label class="label">Current Savings ($)</label><input type="number" id="savings" value="50000"></div><div class="field"><label class="label">Monthly Contribution ($)</label><input type="number" id="monthly" value="1000"></div></div>
<div class="row"><div class="field"><label class="label">Expected Return (%)</label><input type="number" id="returnRate" value="7" step="0.1"></div><div class="field"><label class="label">Desired Annual Income ($)</label><input type="number" id="income" value="80000"></div></div>

<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const age=+$('age').value,ret=+$('retAge').value,sav=+$('savings').value,m=+$('monthly').value,r=+$('returnRate').value/100,inc=+$('income').value;const years=ret-age;let balance=sav;for(let i=0;i<years*12;i++){balance=balance*(1+r/12)+m}const needed=inc*25;const gap=needed-balance;const onTrack=balance>=needed;$('out').innerHTML='<div class="stat"><div class="val" style="font-size:1.5rem;color:'+(onTrack?'#22c55e':'#ef4444')+'">$'+fmt(balance,0)+'</div><div class="lbl">Projected at Retirement</div></div><div class="stat"><div class="val">$'+fmt(needed,0)+'</div><div class="lbl">Target Needed (25x Rule)</div></div><div class="stat"><div class="val" style="color:'+(onTrack?'#22c55e':'#ef4444')+'">'+(onTrack?'✅ On Track':'⚠️ $'+fmt(gap,0)+' Short')+'</div><div class="lbl">Status</div></div><div class="stat"><div class="val">'+years+' yrs</div><div class="lbl">Years to Retirement</div></div><div class="stat"><div class="val">$'+fmt(m*12*years+sav,0)+'</div><div class="lbl">Total Contributions</div></div><div class="stat"><div class="val">$'+fmt(balance-(m*12*years+sav),0)+'</div><div class="lbl">Interest Earned</div></div>'}
if(typeof calc==='function')calc();</script></body></html>
