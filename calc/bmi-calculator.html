<div class="calc"><div class="row"><div class="field"><label class="label">Weight (lbs)</label><input type="number" id="weight" value="170"></div><div class="field"><label class="label">Height</label><div class="row"><input type="number" id="feet" value="5" placeholder="ft"><input type="number" id="inches" value="10" placeholder="in"></div></div></div>
<button class="btn" onclick="calc()">Calculate BMI</button><div class="results-grid" id="out"></div></div>
<div class="cl-ad"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3112605892426625" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>



<script>
const $=id=>document.getElementById(id);
const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';
function calc(){const w=+$('weight').value;const h=+$('feet').value*12+ +$('inches').value;const bmi=(w/(h*h)*703);let cat='Normal',col='#22c55e';if(bmi<18.5){cat='Underweight';col='#3b82f6'}else if(bmi>=25&&bmi<30){cat='Overweight';col='#f59e0b'}else if(bmi>=30){cat='Obese';col='#ef4444'}
$('out').innerHTML='<div class="stat"><div class="val" style="color:'+col+'">'+bmi.toFixed(1)+'</div><div class="lbl">BMI</div></div><div class="stat"><div class="val" style="color:'+col+'">'+cat+'</div><div class="lbl">Category</div></div><div class="stat"><div class="val">'+fmt(18.5*h*h/703,0)+'-'+fmt(24.9*h*h/703,0)+'</div><div class="lbl">Healthy Range (lbs)</div></div>'}
if(typeof calc==='function')calc();
</script>
