<main><h1>Debt-to-Income Ratio Calculator</h1><p class="sub">Calculate your DTI ratio. Lenders use this to determine mortgage and loan eligibility.</p><div class="calc"><div class="field"><label class="label">Monthly Gross Income ($)</label><input type="number" id="income" value="7000"></div>
<p class="label" style="margin-top:1rem;margin-bottom:.5rem">Monthly Debt Payments:</p>
<div class="row"><div class="field"><label class="label">Mortgage/Rent ($)</label><input type="number" id="mortgage" value="1800"></div><div class="field"><label class="label">Car Payment ($)</label><input type="number" id="car" value="450"></div></div>
<div class="row"><div class="field"><label class="label">Student Loans ($)</label><input type="number" id="student" value="300"></div><div class="field"><label class="label">Credit Cards (min) ($)</label><input type="number" id="cc" value="150"></div></div>
<div class="field"><label class="label">Other Debt Payments ($)</label><input type="number" id="other" value="0"></div>
<button class="btn" onclick="calc()">Calculate DTI</button><div class="results-grid" id="out"></div></div></main>

<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const inc=+$('income').value;const debt=+$('mortgage').value+ +$('car').value+ +$('student').value+ +$('cc').value+ +$('other').value;const dti=debt/inc*100;const rating=dti<=36?'🟢 Excellent':dti<=43?'🟡 Acceptable':dti<=50?'🟠 High':'🔴 Very High';const mortgage=dti<=36?'✅ Likely qualified':dti<=43?'⚠️ May qualify':'❌ Unlikely to qualify';$('out').innerHTML='<div class="stat"><div class="val" style="font-size:2rem;color:'+(dti<=36?'#22c55e':dti<=43?'#eab308':'#ef4444')+'">'+fmt(dti,1)+'%</div><div class="lbl">Debt-to-Income Ratio</div></div><div class="stat"><div class="val">'+rating+'</div><div class="lbl">Rating</div></div><div class="stat"><div class="val">'+mortgage+'</div><div class="lbl">Mortgage Eligibility</div></div><div class="stat"><div class="val">$'+fmt(debt)+'</div><div class="lbl">Total Monthly Debt</div></div><div class="stat"><div class="val">$'+fmt(inc-debt)+'</div><div class="lbl">Remaining Income</div></div><div class="stat"><div class="val">$'+fmt((inc*0.36)-debt)+'</div><div class="lbl">Room for More Debt (36%)</div></div>'}
if(typeof calc==='function')calc();</script></body></html>
