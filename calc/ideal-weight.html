<main>
<h1>Ideal Weight Calculator</h1>
<p class="sub">Calculate your ideal body weight using multiple medical formulas — Devine, Robinson, Miller, Hamwi.</p>
<div class="calc"><div class="row"><div class="field"><label class="label">Gender</label><select id="gender"><option value="male">Male</option><option value="female">Female</option></select></div><div class="field"><label class="label">Height</label><div class="row"><input type="number" id="feet" value="5" placeholder="ft"><input type="number" id="inches" value="10" placeholder="in"></div></div></div>
<button class="btn" onclick="calc()">Calculate</button><div class="results-grid" id="out"></div></div>
</main>
<div class="ad"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-3112605892426625" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
<footer><a href="../index.html">CalcLeap</a> · <a href="https://alexchalu.github.io/smartcalc/">SmartCalc</a> · Free online calculators</footer>
<script>
const $=id=>document.getElementById(id);
const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';
function calc(){const g=$('gender').value;const h=+$('feet').value*12+ +$('inches').value;const over=h-60;
const devine=g==='male'?50+2.3*over:45.5+2.3*over;const robinson=g==='male'?52+1.9*over:49+1.7*over;const miller=g==='male'?56.2+1.41*over:53.1+1.36*over;const hamwi=g==='male'?48+2.7*over:45.5+2.2*over;
const avg=(devine+robinson+miller+hamwi)/4;const toKg=2.205;
$('out').innerHTML='<div class="stat"><div class="val" style="color:var(--a)">'+fmt(avg*toKg,0)+' lbs</div><div class="lbl">Average Ideal Weight</div></div><div class="stat"><div class="val">'+fmt(devine*toKg,0)+' lbs</div><div class="lbl">Devine Formula</div></div><div class="stat"><div class="val">'+fmt(robinson*toKg,0)+' lbs</div><div class="lbl">Robinson Formula</div></div><div class="stat"><div class="val">'+fmt(miller*toKg,0)+' lbs</div><div class="lbl">Miller Formula</div></div>'}
if(typeof calc==='function')calc();
</script>
