<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const d=+$('diag').value;const[rw,rh]=$('ratio').value.split(':').map(Number);const angle=Math.atan(rh/rw);const h=d*Math.sin(angle);const w=d*Math.cos(angle);const area=w*h;$('out').innerHTML='<div class="stat"><div class="val" style="color:var(--a)">'+fmt(w,1)+'"</div><div class="lbl">Width</div></div><div class="stat"><div class="val">'+fmt(h,1)+'"</div><div class="lbl">Height</div></div><div class="stat"><div class="val">'+fmt(w*2.54,1)+' cm</div><div class="lbl">Width (metric)</div></div><div class="stat"><div class="val">'+fmt(h*2.54,1)+' cm</div><div class="lbl">Height (metric)</div></div><div class="stat"><div class="val">'+fmt(area,0)+' in²</div><div class="lbl">Screen Area</div></div><div class="stat"><div class="val">'+fmt(d,1)+'"</div><div class="lbl">Diagonal</div></div>'}
