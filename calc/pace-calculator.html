<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function toggleMode(){}function calc(){const dist=+$('dist').value*(($('dunit').value==='mi')?1.60934:1);const totalSec=+$('th').value*3600+ +$('tm').value*60+ +$('ts').value;const paceSecKm=totalSec/dist;const paceSecMi=paceSecKm*1.60934;const speedKmh=dist/(totalSec/3600);const speedMph=speedKmh/1.60934;const pm=Math.floor(paceSecKm/60);const ps=Math.round(paceSecKm%60);const pmm=Math.floor(paceSecMi/60);const pms=Math.round(paceSecMi%60);const races=[['5K',5],['10K',10],['Half Marathon',21.0975],['Marathon',42.195]];let raceHtml=races.map(([name,d])=>{const t=paceSecKm*d;const h=Math.floor(t/3600);const m=Math.floor((t%3600)/60);const s=Math.round(t%60);return'<div class="stat"><div class="val">'+(h?h+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'</div><div class="lbl">'+name+'</div></div>'}).join('');$('out').innerHTML='<div class="stat"><div class="val" style="color:var(--a)">'+pm+':'+String(ps).padStart(2,'0')+'</div><div class="lbl">Pace /km</div></div><div class="stat"><div class="val">'+pmm+':'+String(pms).padStart(2,'0')+'</div><div class="lbl">Pace /mile</div></div><div class="stat"><div class="val">'+fmt(speedKmh,1)+'</div><div class="lbl">km/h</div></div><div class="stat"><div class="val">'+fmt(speedMph,1)+'</div><div class="lbl">mph</div></div>'+raceHtml}
if(typeof calc==='function')calc();</script></body></html>
