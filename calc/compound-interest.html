ght:800;color:var(--a)}.stat .lbl{font-size:.7rem;color:var(--m)}.ad{max-width:800px;margin:1rem auto;padding:0 1.5rem}footer{text-align:center;padding:1.5rem;color:var(--m);font-size:.8rem;border-top:1px solid var(--b);margin-top:2rem}footer a{color:var(--a);text-decoration:none}table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:1rem}th,td{padding:.5rem .6rem;text-align:right;border-bottom:1px solid var(--b)}th{color:var(--m);font-weight:600;font-size:.7rem;text-transform:uppercase}td:first-child,th:first-child{text-align:left}@media(max-width:600px){.row,.row3{grid-template-columns:1fr}.results-grid{grid-template-columns:1fr 1fr}}</style>

<main><h1>Compound Interest Calculator</h1><p class="sub">Calculate compound interest with monthly contributions. See how your money grows over time with detailed charts.</p><div class="calc"><div class="row"><div class="field"><label class="label">Initial Investment ($)</label><input type="number" id="principal" value="10000"></div><div class="field"><label class="label">Monthly Contribution ($)</label><input type="number" id="monthly" value="500"></div></div>
<div class="row"><div class="field"><label class="label">Annual Interest Rate (%)</label><input type="number" id="rate" value="7" step="0.1"></div><div class="field"><label class="label">Years</label><input type="number" id="years" value="20"></div></div>
<div class="field"><label class="label">Compound Frequency</label><select id="freq"><option value="12" selected>Monthly</option><option value="4">Quarterly</option><option value="1">Annually</option><option value="365">Daily</option></select></div>
<button class="btn" onclick="calc()">Calculate</button><div class="results-grid" id="out"></div><div id="table"></div></div></main>

<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const P=+$('principal').value,m=+$('monthly').value,r=+$('rate').value/100,y=+$('years').value,n=+$('freq').value;let balance=P;const totalContrib=P+m*12*y;let rows='<table><tr><th>Year</th><th>Contributions</th><th>Interest</th><th>Balance</th></tr>';for(let yr=1;yr<=y;yr++){for(let i=0;i<12;i++){balance+=m;balance*=(1+r/n)}const contrib=P+m*12*yr;const interest=balance-contrib;rows+='<tr><td>'+yr+'</td><td>$'+fmt(contrib,0)+'</td><td>$'+fmt(interest,0)+'</td><td>$'+fmt(balance,0)+'</td></tr>'}rows+='</table>';const totalInterest=balance-totalContrib;$('out').innerHTML='<div class="stat"><div class="val" style="font-size:1.5rem;color:#22c55e">$'+fmt(balance,0)+'</div><div class="lbl">Final Balance</div></div><div class="stat"><div class="val">$'+fmt(totalContrib,0)+'</div><div class="lbl">Total Contributions</div></div><div class="stat"><div class="val">$'+fmt(totalInterest,0)+'</div><div class="lbl">Total Interest Earned</div></div><div class="stat"><div class="val">'+fmt(totalInterest/totalContrib*100,0)+'%</div><div class="lbl">Interest/Contributions</div></div>';$('table').innerHTML=rows}
if(typeof calc==='function')calc();</script></body></html>
