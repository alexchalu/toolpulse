<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function fromHex(){const h=$('hex').value.replace('#','');if(h.length===6){const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);$('r').value=r;$('g').value=g;$('b').value=b;update(r,g,b)}}function fromRgb(){const r=+$('r').value,g=+$('g').value,b=+$('b').value;$('hex').value='#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');update(r,g,b)}function update(r,g,b){const hex=$('hex').value;$('preview').style.background=hex;const hsl=rgbToHsl(r,g,b);$('out').innerHTML='<div class="stat"><div class="val" style="font-size:.9rem">'+hex+'</div><div class="lbl">HEX</div></div><div class="stat"><div class="val" style="font-size:.9rem">rgb('+r+', '+g+', '+b+')</div><div class="lbl">RGB</div></div><div class="stat"><div class="val" style="font-size:.9rem">hsl('+hsl[0]+', '+hsl[1]+'%, '+hsl[2]+'%)</div><div class="lbl">HSL</div></div><div class="stat"><div class="val"><button onclick="navigator.clipboard.writeText(\''+hex+'\');this.textContent=\'✓\'" style="background:var(--a);color:#fff;border:none;padding:.3rem .8rem;border-radius:6px;cursor:pointer">Copy HEX</button></div><div class="lbl">&nbsp;</div></div>'}function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}return[Math.round(h*360),Math.round(s*100),Math.round(l*100)]}fromHex()
