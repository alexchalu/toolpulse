<main><h1>Blood Alcohol Content (BAC) Calculator</h1><p class="sub">Estimate your blood alcohol level based on drinks consumed, body weight, and time. Know when you are safe to drive.</p><div class="calc"><div class="row"><div class="field"><label class="label">Your Weight (lbs)</label><input type="number" id="weight" value="180"></div><div class="field"><label class="label">Gender</label><select id="gender"><option value="male">Male</option><option value="female">Female</option></select></div></div>

<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const w=+$('weight').value,g=$('gender').value,d=+$('drinks').value,h=+$('hours').value;const r=g==='male'?0.68:0.55;const bac=(d*0.6*5.14)/(w*r)-0.015*h;const level=Math.max(0,bac);const status=level<0.02?'🟢 Sober':level<0.04?'🟡 Minimal':level<0.08?'🟠 Impaired':level<0.15?'🔴 Legally Drunk':'🚨 Dangerous';const drive=level<0.08?'✅ Under legal limit':'❌ Over legal limit (0.08)';const soberIn=level>0?fmt(level/0.015,1)+' hours':'Now';$('out').innerHTML='<div class="stat"><div class="val" style="font-size:2rem;color:'+(level<0.08?'#22c55e':'#ef4444')+'">'+fmt(level,3)+'%</div><div class="lbl">Estimated BAC</div></div><div class="stat"><div class="val">'+status+'</div><div class="lbl">Impairment Level</div></div><div class="stat"><div class="val">'+drive+'</div><div class="lbl">Legal to Drive?</div></div><div class="stat"><div class="val">~'+soberIn+'</div><div class="lbl">Time to Sober</div></div>';$('out').innerHTML+='<div style="grid-column:1/-1;text-align:center;padding:.75rem;background:var(--s);border-radius:8px;margin-top:.5rem;font-size:.8rem;color:var(--m)">⚠️ This is an estimate only. Many factors affect BAC. Never drink and drive.</div>'}
if(typeof calc==='function')calc();</script></body></html>
