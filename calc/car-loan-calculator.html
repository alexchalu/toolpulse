<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const price=+$('price').value,down=+$('down').value,trade=+$('trade').value,r=+$('rate').value/100/12,n=+$('term').value;const loan=price-down-trade;const mp=loan*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);const total=mp*n;const interest=total-loan;$('out').innerHTML='<div class="stat"><div class="val" style="font-size:1.5rem;color:var(--a)">$'+fmt(mp)+'</div><div class="lbl">Monthly Payment</div></div><div class="stat"><div class="val">$'+fmt(loan,0)+'</div><div class="lbl">Loan Amount</div></div><div class="stat"><div class="val">$'+fmt(interest,0)+'</div><div class="lbl">Total Interest</div></div><div class="stat"><div class="val">$'+fmt(total,0)+'</div><div class="lbl">Total Cost</div></div><div class="stat"><div class="val">'+fmt(interest/loan*100,1)+'%</div><div class="lbl">Interest/Principal</div></div><div class="stat"><div class="val">$'+fmt(price,0)+'</div><div class="lbl">Vehicle Price</div></div>'}
