<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function calc(){const t=$('text').value;const words=t.trim()?t.trim().split(/\s+/).length:0;const chars=t.length;const charsNoSpace=t.replace(/\s/g,'').length;const sentences=t.split(/[.!?]+/).filter(s=>s.trim()).length;const paragraphs=t.split(/\n\n+/).filter(p=>p.trim()).length;const readTime=Math.ceil(words/200);$('out').innerHTML='<div class="stat"><div class="val" style="color:var(--a)">'+fmt(words,0)+'</div><div class="lbl">Words</div></div><div class="stat"><div class="val">'+fmt(chars,0)+'</div><div class="lbl">Characters</div></div><div class="stat"><div class="val">'+fmt(charsNoSpace,0)+'</div><div class="lbl">No Spaces</div></div><div class="stat"><div class="val">'+sentences+'</div><div class="lbl">Sentences</div></div><div class="stat"><div class="val">'+paragraphs+'</div><div class="lbl">Paragraphs</div></div><div class="stat"><div class="val">'+readTime+' min</div><div class="lbl">Read Time</div></div>'}
