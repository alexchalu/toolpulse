<main><h1>Concrete Calculator</h1><p class="sub">Calculate how much concrete you need in cubic yards. Enter dimensions for slabs, walls, columns, and footings.</p><div class="calc"><div class="field"><label class="label">Shape</label><select id="shape" onchange="toggleShape()"><option value="slab">Slab / Square Footing</option><option value="cylinder">Cylinder / Round Column</option><option value="wall">Wall / Continuous Footing</option></select></div>
<div id="slabFields"><div class="row3"><div class="field"><label class="label">Length (ft)</label><input type="number" id="length" value="20"></div><div class="field"><label class="label">Width (ft)</label><input type="number" id="width" value="20"></div><div class="field"><label class="label">Depth (in)</label><input type="number" id="depth" value="4"></div></div></div>
<div id="cylFields" style="display:none"><div class="row3"><div class="field"><label class="label">Diameter (in)</label><input type="number" id="diam" value="12"></div><div class="field"><label class="label">Height (ft)</label><input type="number" id="cheight" value="4"></div><div class="field"><label class="label">Quantity</label><input type="number" id="qty" value="4"></div></div></div>

<script>const $=id=>document.getElementById(id);const fmt=(n,d=2)=>typeof n==='number'?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';function toggleShape(){const s=$('shape').value;$('slabFields').style.display=s==='cylinder'?'none':'';$('cylFields').style.display=s==='cylinder'?'':'none'}function calc(){const s=$('shape').value;let cuFt;if(s==='cylinder'){const r=+$('diam').value/2/12;const h=+$('cheight').value;const q=+$('qty').value;cuFt=Math.PI*r*r*h*q}else{cuFt=+$('length').value*+$('width').value*(+$('depth').value/12)}const cuYd=cuFt/27;const bags60=Math.ceil(cuYd*27/0.45);const bags80=Math.ceil(cuYd*27/0.6);$('out').innerHTML='<div class="stat"><div class="val" style="font-size:1.8rem;color:var(--a)">'+fmt(cuYd,2)+'</div><div class="lbl">Cubic Yards</div></div><div class="stat"><div class="val">'+fmt(cuFt,1)+'</div><div class="lbl">Cubic Feet</div></div><div class="stat"><div class="val">'+bags60+'</div><div class="lbl">60-lb Bags</div></div><div class="stat"><div class="val">'+bags80+'</div><div class="lbl">80-lb Bags</div></div><div class="stat"><div class="val">~$'+fmt(cuYd*150,0)+'</div><div class="lbl">Est. Cost (delivered)</div></div><div class="stat"><div class="val">+10%</div><div class="lbl">Order Extra for Waste</div></div>'}
if(typeof calc==='function')calc();</script></body></html>
